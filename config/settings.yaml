# General run settings.

# State file tracking which jobs have already been notified (relative to repo root).
state_file: data/seen_jobs.json

# Drop a seen job from state after this many days (keeps the file small; if a
# posting reappears later it will be treated as new again).
prune_after_days: 120

# HTTP behaviour for all sources.
http:
  timeout_seconds: 20
  retries: 2
  retry_backoff_seconds: 2
  user_agent: "intern-pos-emailer/1.0 (+https://github.com/) personal job alerter"
  # polite delay between requests to the same host (seconds)
  per_request_delay: 0.3

# Per-source cap on number of jobs pulled (0 = unlimited). Safety valve.
max_jobs_per_source: 0

# Email digest.
email:
  enabled: true
  subject_prefix: "[Intern Alert]"
  # group order in the digest
  category_order: [swe, quant, consulting, other]
  # When a NEW posting is from one of these companies, the digest goes URGENT:
  # subject + headline become "FAANG job out now" and the roles are banner-ed at
  # the top. Edit freely (e.g. add nvidia, microsoft).
  faang_companies: [meta, facebook, amazon, apple, netflix, google, alphabet]

# SMS nudge (OFF — email-only setup). To enable later: set enabled: true,
# uncomment twilio in requirements.txt, and add the TWILIO_* secrets.
sms:
  enabled: false
  # template; {n} is replaced with the new-job count
  template: "{n} new SWE/quant/consulting internships today. Check your email for the digest."
  # don't send an SMS unless at least this many new jobs (avoids paying for tiny alerts)
  min_jobs: 1

# Discord webhook digest. Add DISCORD_WEBHOOK_URL as a GitHub Actions secret.
discord:
  enabled: true
  username: "internship bot"
  max_jobs: 15
  timeout_seconds: 10

# If true, send nothing on days with zero new jobs (recommended — no noise).
suppress_when_empty: true

# Auto-apply tool (LOCAL only: python -m src.apply). The daily email job ignores this.
apply:
  # auto_simple_review_hard: auto-submit forms with no extra required fields,
  #                          pause for your review when a form has custom questions.
  #                          Requires passing --auto-submit at runtime.
  # review_all:  fill everything, always pause for you to submit.
  # auto_all:    fill and submit everything (riskiest; requires --auto-submit).
  mode: review_all
  generate_cover_letter: false  # opt in with --cover-letter; sends data to Google
  daily_limit: 10               # max applications per run
  # ATSes the apply tool knows how to fill. Jobs from other sources are skipped
  # (you still get them in the email digest).
  supported_ats: [greenhouse, lever, ashby]
