# Filtering rules. Everything here is tunable without touching code.
# A job is kept only if it passes ALL of: role/season, category keywords, US location, active.

# ---------------------------------------------------------------------------
# 1) ROLE / SEASON
# ---------------------------------------------------------------------------
role:
  # We only want internships (not new-grad full-time / experienced).
  require_internship: true

  # Title substrings (lowercased) that mark a posting as an internship.
  internship_terms:
    - intern
    - internship
    - co-op
    - coop
    - "co op"
    - summer analyst        # banks/quant call interns "summer analyst"
    - industrial placement
    - student

  # If a title contains any of these, it is rejected outright (full-time/senior roles).
  # NOTE: applied carefully — "intern" titles win even if "engineer" appears.
  exclude_terms:
    - senior
    - staff
    - principal
    - lead
    - manager
    - director
    - "full-time" # only excluded when no internship term present (see code)
    - "full time"

  # Regex-based hard excludes. Useful for abbreviations like "Sr." without
  # accidentally matching unrelated substrings.
  global_exclude_patterns:
    - "\\bsr(?:\\.|\\b)"

  # Seasons we accept. A job's season is detected from tags or title.
  # Empty list = accept any season.
  seasons:
    - summer
    - spring
    - fall          # keep fall/off-cycle co-ops; remove if you only want summer/spring
    - offcycle
    - winter

  # Only keep postings whose detected year is in this list (when a year is detectable).
  # Jobs with no detectable year are kept (many ATS postings omit the year).
  years:
    - 2026
    - 2027

# ---------------------------------------------------------------------------
# 2) CATEGORY KEYWORDS  (title is matched against each group; first hit wins)
#    Order matters: quant is checked before generic swe so "quant developer"
#    classifies as quant, not swe.
# ---------------------------------------------------------------------------
categories:
  quant:
    - quant
    - quantitative
    - trading
    - trader
    - "systematic"
    - "algorithmic"
  swe:
    - software engineer
    - software engineering
    - software developer
    - software development
    - swe
    - "backend"
    - "back-end"
    - "frontend"
    - "front-end"
    - "full stack"
    - "full-stack"
    - "fullstack"
    - "developer"
    - "programmer"
    - "machine learning engineer"
    - "ml engineer"
    - "infrastructure engineer"
    - "platform engineer"
    - "systems engineer"
  consulting:
    - consulting
    - consultant
    - "technology analyst"
    - "tech consulting"
    - "business analyst"   # consulting firms' entry tech/strategy track

# If true, a job must match at least one category group to be kept.
require_category: true

# ---------------------------------------------------------------------------
# 3) LOCATION  (US-only)
# ---------------------------------------------------------------------------
