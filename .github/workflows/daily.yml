name: Daily internship digest

on:
  schedule:
    # GitHub cron is UTC. Include both EDT and EST equivalents, then gate the
    # run job so the bot runs at 11:17 AM, 3:17 PM, and 8:17 PM ET year-round.
    # GitHub cron can be delayed under load; that's fine for a daily digest.
    - cron: "17 0 * * *"
    - cron: "17 1 * * *"
    - cron: "17 15 * * *"
    - cron: "17 16 * * *"
    - cron: "17 19 * * *"
    - cron: "17 20 * * *"
  workflow_dispatch:
    # Manual trigger from the Actions tab — use it to test or to keep the
    # schedule alive (GitHub disables crons after 60 days of repo inactivity).
    inputs:
      dry_run:
        description: "Run without sending or saving state"
        type: boolean
        default: false

permissions:
  contents: write   # needed to commit the updated data/seen_jobs.json

concurrency:
  group: daily-internship-digest
  cancel-in-progress: false

jobs:
  schedule_gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.time.outputs.should_run }}
    steps:
      - name: Check Eastern run time
        id: time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cron="${{ github.event.schedule }}"
          read -r minute hour _ <<< "$cron"

          # Use the scheduled UTC slot, not runner wall-clock time, because
          # GitHub can start scheduled workflows late.
          utc_date="$(date -u +'%Y-%m-%d')"
          eastern_time="$(TZ=America/New_York date -d "${utc_date} ${hour}:${minute}:00 UTC" +'%H:%M')"
          case "$eastern_time" in
            11:17|15:17|20:17)
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "Skipping scheduled run at ${eastern_time} ET."
              ;;
          esac

  run:
    needs: schedule_gate
    if: needs.schedule_gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # SMS is off by default. If you enable it in config/settings.yaml, also
          # add these secrets:
          # TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          # TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          # TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          # SMS_TO: ${{ secrets.SMS_TO }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m src.main --dry-run
          else
            python -m src.main
          fi

      - name: Commit updated state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/seen_jobs.json; then
            git add data/seen_jobs.json
            git commit -m "chore: update seen jobs state [skip ci]"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
          else
            echo "No state changes to commit."
          fi
